TASK: "face_detection"
DEVICE: "cuda:0"
NUM_WORKERS: 4

FACE_MODEL:
  INPUT_SIZE: 256
  BACKBONE: "mobilenetv2"
  BACKBONE_ALPHA: 1.0
  NUM_LANDMARKS: 5
  FPN_CHANNELS: 96
  PRETRAINED: true
  WEIGHTS: ""

FACE_DATA:
  CLEANED_LABELS_DIR: "D:/cleaned_labels"
  PURE_DIR: "D:/PURE"
  LABELS_DIR: "D:/PURE_labels"
  WIDER_DIR: "D:/WIDER_FACE/WIDER_train/images"
  WIDER_LABELS_DIR: "D:/WIDER_FACE_labels"
  CELEBA_IMG_DIR: "D:/CelebA"
  CELEBA_LABELS_DIR: "D:/CelebA_labels"
  W300_DIR: "D:/300W"
  W300_LABELS_DIR: "D:/300W_labels"
  TRAIN_SPLIT: 0.8

AUGMENTATION:
  ROTATION_RANGE: 30.0
  SCALE_MIN: 0.7
  SCALE_MAX: 1.3
  BRIGHTNESS: 0.3
  CONTRAST: 0.3
  SATURATION: 0.2
  HUE: 0.1
  BLUR_PROB: 0.3
  BLUR_LIMIT: 7
  NOISE_PROB: 0.2
  HORIZONTAL_FLIP: true
  PERSPECTIVE_PROB: 0.3

FACE_TRAIN:
  BATCH_SIZE: 24
  EPOCHS: 100
  LR: 0.001
  MIN_LR: 0.00001
  WARMUP_EPOCHS: 5
  WEIGHT_DECAY: 0.001
  GRAD_CLIP: 5.0
  BBOX_WEIGHT: 1.0
  LANDMARK_WEIGHT: 1.5
  CONFIDENCE_WEIGHT: 0.1
  EARLY_STOPPING_PATIENCE: 20

OUTPUT:
  CHECKPOINT_DIR: "checkpoints/face"
  LOG_DIR: "logs/face"
