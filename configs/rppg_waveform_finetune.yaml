TASK:              "rppg_finetune"
DEVICE:            "cuda:0"
NUM_WORKERS:       0
SEED:              42
GPU_MEMORY_LIMIT_MB: 13000

RPPG_MODEL:
  NAME:                    "FCAtt_v3"
  FRAMES:                  128
  FPS:                     30
  INPUT_SIZE:              72
  FREQ_ATT_POOL_SIZE:      8
  FREQ_ATT_TEMPORAL_KERNEL: 5
  FREQ_ATT_SHARPNESS:      15.0
  NUM_FREQ_BLOCKS:         3
  FREQ_LOW:                0.7
  FREQ_HIGH:               2.5
  SPO2_MIN:                85.0
  SPO2_RANGE:              15.0
  # 必須指定預訓練權重（Stage-1 結果）
  WEIGHTS: "checkpoints/rppg_semi_V3/rppg_fcatt_v3_128f_72px_best.pth"

RPPG_DATA:
  DATASET:      "PURE+MCD-rPPG"
  DATA_PATH:    ""
  CACHED_PATH:  ""
  CACHED_PATHS:
    - "D:/PreprocessedData"       # PURE (labeled)
    - "D:/PreprocessedData_MCD"   # MCD-rPPG (labeled)
  FS:           30
  CHUNK_LENGTH: 128
  LABEL_TYPE:   "DiffNormalized"
  DATA_TYPE:    "Raw"
  CROP_FACE:    true
  LARGE_BOX_COEF: 1.5
  RESIZE_W:     72
  RESIZE_H:     72
  DO_PREPROCESS: false
  TEST_DATASET:       "UBFC"
  TEST_DATA_PATH:     "D:/UBFC/DATASET_2"
  TEST_CACHED_PATH:   ""
  TEST_CACHED_PATHS:
    - "D:/PreprocessedData_UBFC"
  TRAIN_BEGIN:  0.0
  TRAIN_END:    0.8
  VALID_BEGIN:  0.8
  VALID_END:    1.0
  TEST_BEGIN:   0.0
  TEST_END:     1.0

RPPG_TRAIN:
  BATCH_SIZE:   8
  GRAD_CLIP:    1.0

RPPG_FINETUNE:
  EPOCHS:         30
  PATIENCE:       15
  LR_G:           5.0e-5   # Generator (HRBranch) — 小 LR 避免破壞頻率特徵
  LR_D:           2.0e-4   # Discriminator — 略快，確保判別能力
  LAMBDA_MSE:     10.0     # Z-score MSE 權重（與 NegPearson×100 量級匹配）
  LAMBDA_ADV:     0.1      # Adversarial 權重（保守，避免 GAN 不穩定）
  WARMUP_EPOCHS:  5        # 前 5 epoch 只用 supervised loss，讓 G 先有基礎品質

OUTPUT:
  CHECKPOINT_DIR: "checkpoints/rppg_finetune"
  LOG_DIR:        "logs/rppg_finetune"
