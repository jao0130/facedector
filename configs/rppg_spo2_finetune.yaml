TASK:                "rppg_spo2_finetune"
DEVICE:              "cuda:0"
NUM_WORKERS:         0
SEED:                42
GPU_MEMORY_LIMIT_MB: 13000

RPPG_MODEL:
  NAME: "FCAtt_v3"
  FRAMES:    128
  FPS:       30
  FREQ_LOW:  0.7
  FREQ_HIGH: 2.5
  SPO2_OFFSET: 80.0
  FREQ_ATT_POOL_SIZE:       8
  FREQ_ATT_TEMPORAL_KERNEL: 5
  FREQ_ATT_SHARPNESS:       10.0
  NUM_FREQ_BLOCKS: 3
  INPUT_SIZE:      72

  WEIGHTS: "checkpoints/rppg_finetune_v3/rppg_fcatt_v3_128f_72px_finetune_best.pth"

RPPG_DATA:
  DATASET:      "MCD-rPPG"
  DATA_PATH:    ""
  CACHED_PATH:  ""
  CACHED_PATHS:
    - "D:/PreprocessedData_MCD"      # MCD-rPPG: BVP + SpO2 (8000 chunks)
  FS:           30
  CHUNK_LENGTH: 128
  LABEL_TYPE:   "DiffNormalized"
  DATA_TYPE:    "Raw"
  CROP_FACE:    true
  LARGE_BOX_COEF: 1.5
  RESIZE_W:     72
  RESIZE_H:     72
  DO_PREPROCESS: false

  TEST_DATASET:     ""
  TEST_DATA_PATH:   ""
  TEST_CACHED_PATH: ""
  TEST_CACHED_PATHS: []

  TRAIN_BEGIN: 0.0
  TRAIN_END:   0.8
  VALID_BEGIN: 0.8
  VALID_END:   1.0
  TEST_BEGIN:  0.0
  TEST_END:    1.0

RPPG_TRAIN:
  BATCH_SIZE: 8
  GRAD_CLIP:  1.0

RPPG_SPO2_FINETUNE:
  EPOCHS:    60
  PATIENCE:  15
  LR:        2.0e-5
  LAMBDA_SPO2:    1.0
  LAMBDA_CONSIST: 0.5   # 一致性：擾動影片仍預測正確標籤
  LAMBDA_DIV:     1.0   # Diversity：防止 collapse，懲罰 std(pred) < 0.3%

  # PURE: 獨立測試集（不參與訓練）
  PURE_PATH: "D:/PreprocessedData"
  PURE_TRAIN_SUBJECTS: []
  PURE_TEST_SUBJECTS:  ["01","02","03","04","05","06","07","08","09","10"]

  # 取得 VIPL-HR 後填入（84-99% SpO2，107 受試者）
  # VIPL_PATH: "D:/PreprocessedData_VIPL"
  # VIPL_TRAIN_SUBJECTS: [...]
  # VIPL_TEST_SUBJECTS:  [...]

OUTPUT:
  CHECKPOINT_DIR: "checkpoints/rppg_spo2_finetune"
  LOG_DIR:        "logs/rppg_spo2_finetune"
