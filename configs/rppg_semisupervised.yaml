TASK: "rppg_semi"
DEVICE: "cuda:0"
NUM_WORKERS: 0

RPPG_MODEL:
  NAME: "FCAtt_v3"
  FRAMES: 128
  FPS: 30
  INPUT_SIZE: 72
  FREQ_ATT_POOL_SIZE: 8
  FREQ_ATT_TEMPORAL_KERNEL: 3
  FREQ_ATT_SHARPNESS: 10.0
  NUM_FREQ_BLOCKS: 3
  FREQ_LOW: 0.7
  FREQ_HIGH: 2.5
  SPO2_MIN: 85.0
  SPO2_RANGE: 15.0
  WEIGHTS: ""

RPPG_DATA:
  DATASET: "PURE"
  DATA_PATH: ""
  CACHED_PATH: ""
  CACHED_PATHS:
    - "D:/PreprocessedData"          # PURE (labeled, training only)
  FS: 30
  CHUNK_LENGTH: 128
  LABEL_TYPE: "DiffNormalized"
  DATA_TYPE: "Raw"
  CROP_FACE: true
  LARGE_BOX_COEF: 1.5
  RESIZE_W: 72
  RESIZE_H: 72
  DO_PREPROCESS: false
  TEST_DATASET: ""
  TEST_DATA_PATH: ""
  TEST_CACHED_PATH: ""
  TEST_CACHED_PATHS:
    - "D:/PreprocessedData_UBFC"     # UBFC test
    - "D:/PreprocessedData_MCD"      # MCD-rPPG test
  TRAIN_BEGIN: 0.0
  TRAIN_END: 0.8
  VALID_BEGIN: 0.8
  VALID_END: 1.0
  TEST_BEGIN: 0.0
  TEST_END: 1.0

RPPG_TRAIN:
  BATCH_SIZE: 8
  EPOCHS: 80
  LR: 0.009
  PRETRAIN_RATIO: 0.6
  GRAD_ACCUMULATION: 8
  GRAD_CLIP: 1.0
  PATIENCE_BVP: 30
  PATIENCE_SPO2: 20
  USE_LAST_EPOCH: false

RPPG_SEMI:
  ENABLED: true
  UNLABELED_PATH: ""
  UNLABELED_PATHS:
    - "D:/PreprocessedData_CelebVHQ" # CelebV-HQ (unlabeled)
  EMA_DECAY: 0.999
  LAMBDA_UNSUP: 1.0
  RAMP_UP_EPOCHS: 30
  FREQ_WEIGHT: 0.5
  UNLABELED_BATCH_SIZE: 2
  EPOCHS: 80
  LR: 0.003
  PATIENCE: 40

OUTPUT:
  CHECKPOINT_DIR: "checkpoints/rppg_semi"
  LOG_DIR: "logs/rppg_semi"
